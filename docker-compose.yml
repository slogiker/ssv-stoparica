services:
  nginx:
    image: nginx:alpine
    ports:
      - "8742:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  backend:
    build: ./backend
    environment:
      - JWT_SECRET=${JWT_SECRET:-dev-secret-ssv-stoparica-change-in-prod}
      - PORT=4827
      - DB_PATH=/app/data/stoparica.db
    volumes:
      - sqlite_data:/app/data
    ports:
      - "4827:4827"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:4827/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

volumes:
  sqlite_data:
